name: Lint and Format

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  # Job 1: Проверка форматирования и линтинг
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Verify formatting with gofmt
        run: |
          # Проверяем форматирование, если есть неотформатированные файлы - падаем
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "❌ These files are not formatted:"
            echo "$UNFORMATTED"
            echo "Run 'gofmt -w .' to fix"
            exit 1
          fi
          echo "✅ All files are formatted with gofmt"

      - name: Run go vet
        run: |
          # Стандартный встроенный анализатор
          go vet ./...
          echo "✅ go vet passed"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          args: --timeout=5m --verbose
          # Включаем все популярные линтеры
          # Конфигурацию можно вынести в .golangci.yml

      - name: Check go mod tidy
        run: |
          # Проверяем, что go.mod и go.sum актуальны
          go mod tidy
          if [ -n "$(git status --porcelain go.mod go.sum)" ]; then
            echo "❌ go.mod or go.sum is not tidy"
            echo "Run 'go mod tidy' and commit changes"
            git diff go.mod go.sum
            exit 1
          fi
          echo "✅ go.mod and go.sum are tidy"

  # Job 2: Автоматическое форматирование (опционально, для веток разработки)
  auto-format:
    name: Auto-format on push to develop
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'

      - name: Format code
        run: |
          gofmt -w .
          go mod tidy

      - name: Commit formatted code
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-format code with gofmt"
          branch: ${{ github.head_ref || github.ref_name }}
          file_pattern: "*.go go.mod go.sum"