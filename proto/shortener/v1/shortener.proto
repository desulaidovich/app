syntax = "proto3";

package shortener.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/desulaidovich/app/api/shortener/v1;shortenerv1";

service ShortenerService {
  // Создание короткой ссылки
  rpc Shorten(ShortenRequest) returns (ShortenResponse) {
    option (google.api.http) = {
      post: "/api/v1/shorten"
      body: "*"
    };
  }

  // Получение оригинального URL по короткому коду
  rpc GetOriginal(GetOriginalRequest) returns (GetOriginalResponse) {
    option (google.api.http) = {
      get: "/api/v1/{short_code}"
    };
  }

  // Редирект на оригинальный URL
  rpc Redirect(RedirectRequest) returns (RedirectResponse) {
    option (google.api.http) = {
      get: "/{short_code}"
    };
  }

  // Получение статистики по ссылке
  rpc GetStats(GetStatsRequest) returns (GetStatsResponse) {
    option (google.api.http) = {
      get: "/api/v1/stats/{short_code}"
    };
  }

  // Обновление ссылки (например, изменение оригинального URL)
  rpc Update(UpdateRequest) returns (UpdateResponse) {
    option (google.api.http) = {
      put: "/api/v1/{short_code}"
      body: "*"
    };
  }

  // Удаление ссылки
  rpc Delete(DeleteRequest) returns (DeleteResponse) {
    option (google.api.http) = {
      delete: "/api/v1/{short_code}"
    };
  }

  // Получение списка ссылок пользователя
  rpc ListUserLinks(ListUserLinksRequest) returns (ListUserLinksResponse) {
    option (google.api.http) = {
      get: "/api/v1/links"
    };
  }
}

message ShortenRequest {
  string original_url = 1;
  string custom_code = 2;
  int64 ttl_seconds = 3;
  string user_id = 4;
}

message ShortenResponse {
  string short_code = 1;
  string short_url = 2;
  string original_url = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp expires_at = 5;
  bool is_custom = 6;
}

message GetOriginalRequest {
  string short_code = 1;
}

message GetOriginalResponse {
  string original_url = 1;
  string short_code = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp expires_at = 4;
  int64 clicks = 5;
  bool is_active = 6;
}

message RedirectRequest {
  string short_code = 1;
  string user_agent = 2;
  string ip_address = 3;
  string referer = 4;
}

message RedirectResponse {
  string original_url = 1;
  string short_code = 2;
  bool is_redirect = 3;
}

message GetStatsRequest {
  string short_code = 1;
  string period = 2;
}

message GetStatsResponse {
  string short_code = 1;
  string original_url = 2;
  int64 total_clicks = 3;
  int64 unique_clicks = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp expires_at = 6;
  repeated ClickStats clicks_by_day = 7;
  repeated RefererStats top_referers = 8;
  repeated DeviceStats devices = 9;
}

message ClickStats {
  string date = 1;
  int64 clicks = 2;
}

message RefererStats {
  string referer = 1;
  int64 clicks = 2;
}

message DeviceStats {
  string device_type = 1;
  string browser = 2;
  string os = 3;
  int64 clicks = 4;
}

message UpdateRequest {
  string short_code = 1;
  string new_original_url = 2;
  int64 ttl_seconds = 3;
  bool is_active = 4;
}

message UpdateResponse {
  bool success = 1;
  string message = 2;
  ShortenResponse updated_link = 3;
}

message DeleteRequest {
  string short_code = 1;
}

message DeleteResponse {
  bool success = 1;
  string message = 2;
}

message ListUserLinksRequest {
  string user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
  string sort_by = 4;
  string sort_order = 5;
}

message ListUserLinksResponse {
  repeated LinkInfo links = 1;
  int32 total_count = 2;
  int32 page = 3;
  int32 page_size = 4;
  bool has_next = 5;
}

message LinkInfo {
  string short_code = 1;
  string short_url = 2;
  string original_url = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
  google.protobuf.Timestamp expires_at = 6;
  int64 clicks = 7;
  bool is_active = 8;
  bool is_custom = 9;
}